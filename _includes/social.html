<div class="id-social-row">
  {% for account in site.author %}
  {%- assign service_name = account[0] -%}
  {%- assign service_data = site.data.social-media[service_name] -%}
  {%- if service_data -%}
  <a class="id-social-link" href="{{ service_data.url }}{{ account[1] }}" target="_blank"
    title="{{ service_name | capitalize }}">
    <i class="{{ service_data.icon }}"></i>
  </a>
  {%- endif -%}
  {% endfor %}
</div>
